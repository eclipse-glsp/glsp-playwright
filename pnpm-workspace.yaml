packages:
    - 'packages/*'
    - 'examples/*'

# Security overrides: force patched versions of transitive (dev-only) dependencies that upstream
# tooling (mocha, nyc) still pins to ranges flagged by `pnpm audit`.
overrides:
    serialize-javascript: '>=7.0.5'
    js-yaml: '>=4.1.2'
    diff: '>=8.0.3'

# Tooling (eslint, prettier, ts-node, rimraf, @eclipse-glsp/*-config, ...) is provided
# as transitive deps of @eclipse-glsp/dev and must resolve from the workspace root
# (tsconfig `extends`, lint/build bins). Public-hoist only the dev tooling; app/runtime
# deps stay strictly isolated. pnpm >=11 no longer reads non-auth settings from .npmrc, so
# this lives here.
publicHoistPattern:
    - '@eclipse-glsp/*config*'
    - '@eclipse-glsp/cli'
    - 'eslint'
    - 'eslint-*'
    - '@typescript-eslint/*'
    - 'prettier'
    - 'prettier-plugin-*'
    - 'ts-node'
    - 'rimraf'
    - '@types/*' # type stubs are compile-time-only; hoist so `@types/<x>` resolves at root
    # Playwright bins must resolve at the root (test runner and browser install)
    - '@playwright/test'
    - 'playwright'
    - '@theia/playwright'

# Deps allowed to run install/build scripts (pnpm >=11 replaces onlyBuiltDependencies).
allowBuilds:
    esbuild: true
    unrs-resolver: true
    # Playwright downloads browser binaries on install
    '@playwright/test': true
    playwright: true

# Min age (minutes) of dependency versions to install — supply-chain hardening. 4320 = 72h.
minimumReleaseAge: 4320
minimumReleaseAgeIgnoreMissingTime: false
# First-party packages are consumed as fresh nightlies (next tag), not a supply-chain risk —
# exempt them from the age gate.
minimumReleaseAgeExclude:
    - '@eclipse-glsp/*'
